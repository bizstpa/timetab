<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snoozed Tabs</title>
    <link rel="stylesheet" href="../styles/theme.css" />
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <h1>Snoozed Tabs</h1>
      </header>

      <section class="card settings-row">
        <div class="settings-label">
          <span class="settings-title">Appearance</span>
          <span class="settings-sub">Match system, or force light or dark.</span>
        </div>
        <div
          class="seg theme-control"
          id="theme-control"
          role="group"
          aria-label="Appearance"
        >
          <button type="button" class="seg-btn" data-theme-choice="system">System</button>
          <button type="button" class="seg-btn" data-theme-choice="light">Light</button>
          <button type="button" class="seg-btn" data-theme-choice="dark">Dark</button>
        </div>
      </section>

      <p id="error" class="error-banner" hidden></p>
      <div id="list"></div>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
